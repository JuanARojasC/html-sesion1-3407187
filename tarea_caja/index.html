<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>

<style>
    body{
        display:flex;
        justify-content:center;
        align-items:center;
        background:#c8e3b8;
    }

    .caja{
        position:relative;
        width:700px;
        height:400px;
        background:#c8e3b8;

        border-left:12px solid #1e4c79;
        border-bottom:4px solid #7ccbc8;
        border-top:6px solid #b79816;
    }

    .linea-arriba-2{
        position:absolute;
        top:16px;
        left:0;
        width:700px;
        border-top:6px solid #b79816;
    }

    .linea-derecha{
        position:absolute;
        top:35px;
        right:-12px;
        height:365px;
        border-right:12px dotted #712d9d;
    }

</style>
</head>
<body>

    <div class="caja">
        <div class="linea-arriba-2"></div>
        <div class="linea-derecha"></div>
    </div>

</body>
</html>
