<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
.titulo{
    color: red;
    font-size: 15px;
    background-color: aquamarine;
    letter-spacing: 3px;
}
.menu{
    display: inline;
    background-color: cadetblue;
    color: bisque;
    width: 500px;
    height: 100px;
}
.menu_block{
    display: block;
    background-color: cadetblue;
    color: bisque;
    width: 500px;
    height: 100px;
}
    </style>
</head>
<body>
    <h1 class="titulo">Elementos INLINE</h1>
    <div class="menu">Producto</div>
    <div class="menu">Servicios</div>
    <div class="menu">Contactos</div>
<hr>
<h1 class="titulo">Elementos BLOCK</h1>
<div class="menu_block">Producto</div>
<div class="menu_block">Servicios</div>
<div class="menu_block">Contactos</div>
</body>
</html>
